name: Deploy to GitHub Pages

on:
  # Deploy on code pushes by a human.
  push:
    branches: [main]
  # Deploy after the daily notification workflow finishes: its data-refresh
  # commit is pushed with GITHUB_TOKEN, which by design does NOT trigger other
  # workflows via `push`, so we listen for its completion instead. This keeps
  # the live dashboard's prices/news fresh.
  workflow_run:
    workflows: ["Daily LINE Smart DCA"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Optional: base URL of the Cloudflare live-quote proxy (see /worker).
          # Set a repo Variable of this name to enable the daily-card live
          # overlay; unset = dashboard uses the committed EOD prices.json.
          VITE_QUOTE_PROXY_URL: ${{ vars.VITE_QUOTE_PROXY_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
