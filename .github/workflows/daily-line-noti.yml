name: Daily LINE Smart DCA

on:
  schedule:
    # 00:00 UTC ≈ 07:00 Asia/Bangkok — US EOD close is already posted by then.
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-line-noti
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Smart DCA notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: npx tsx scripts/dailyNoti.ts

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prices.json public/news.json .state/last-sent.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily data refresh [skip ci]"
            git push
          fi
