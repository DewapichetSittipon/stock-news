name: Daily LINE Smart DCA

on:
  schedule:
    # Fires four times each morning — 00:17 / 01:17 / 02:17 / 03:17 UTC
    # (≈07:17–10:17 Asia/Bangkok). GitHub does NOT guarantee scheduled runs: it
    # delays `schedule` events under load and silently DROPS them outright, so a
    # lone daily cron regularly skips a day. Redundant attempts fix that — the
    # send-gates in scripts/dailyNoti.ts (lastDailyDate / lastSentMonth /
    # dipAlerts / sentNews) mean the first run that sees a new EOD close sends
    # and every later run that day no-ops, so extra fires cost nothing but
    # reliability. Odd minute (:17) on purpose: GitHub queues every ':00' cron
    # at once and is likeliest to delay/drop those. The push itself is still
    # gated to once a month for the DCA stream (see docs/adr/0005).
    - cron: '17 0,1,2,3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-line-noti
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Smart DCA notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # Manual runs always send (for testing); scheduled runs obey the
          # once-a-month gate in the script.
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: npx tsx scripts/dailyNoti.ts

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prices.json public/news.json public/ledger.json .state/last-sent.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            # No [skip ci]: this push should trigger the Pages deploy so the
            # live dashboard picks up the fresh prices/news.
            git commit -m "chore: daily data refresh"
            git push
          fi
