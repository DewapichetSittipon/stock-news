name: Daily LINE Smart DCA

on:
  schedule:
    # Runs daily at 00:00 UTC (≈07:00 Asia/Bangkok) to refresh prices.json +
    # news.json for the dashboard; the LINE push itself is gated to once a
    # month (see scripts/dailyNoti.ts / docs/adr/0005).
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-line-noti
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Smart DCA notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # Manual runs always send (for testing); scheduled runs obey the
          # once-a-month gate in the script.
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: npx tsx scripts/dailyNoti.ts

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prices.json public/news.json public/ledger.json .state/last-sent.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            # No [skip ci]: this push should trigger the Pages deploy so the
            # live dashboard picks up the fresh prices/news.
            git commit -m "chore: daily data refresh"
            git push
          fi
